<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#111827"/>
      <stop offset="50%" style="stop-color:#0d1628"/>
      <stop offset="100%" style="stop-color:#0a0f1e"/>
    </linearGradient>
    <linearGradient id="gl" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#9b7d36;stop-opacity:0"/>
      <stop offset="30%" style="stop-color:#c9a84c"/>
      <stop offset="70%" style="stop-color:#c9a84c"/>
      <stop offset="100%" style="stop-color:#9b7d36;stop-opacity:0"/>
    </linearGradient>
    <linearGradient id="cb" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#141d2e"/>
      <stop offset="100%" style="stop-color:#1a2540"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- 배경 장식 원 (우측) -->
  <circle cx="1050" cy="315" r="350" fill="none" stroke="#1f3260" stroke-width="1" opacity="0.3"/>
  <circle cx="1050" cy="315" r="250" fill="none" stroke="#1f3260" stroke-width="1" opacity="0.25"/>
  <circle cx="1050" cy="315" r="150" fill="none" stroke="#c9a84c" stroke-width="1" opacity="0.1"/>

  <!-- 상단/하단 골드 라인 -->
  <rect x="0" y="0" width="1200" height="5" fill="url(#gl)"/>
  <rect x="0" y="625" width="1200" height="5" fill="url(#gl)"/>

  <!-- 좌측 세로 골드 라인 -->
  <rect x="78" y="60" width="2" height="510" fill="#c9a84c" opacity="0.25"/>

  <!-- 메인 카드 (전체 폭, 두번째 사진처럼) -->
  <rect x="108" y="60" width="984" height="510" rx="4" fill="url(#cb)" opacity="0.55"/>
  <rect x="108" y="60" width="984" height="5" fill="url(#gl)"/>
  <rect x="108" y="565" width="984" height="5" fill="url(#gl)"/>

  <!-- LABEL -->
  <text x="148" y="128" font-family="Arial,sans-serif" font-size="13" font-weight="700" fill="#c9a84c" letter-spacing="5">LABOR · HR · DAILY BRIEF</text>

  <!-- 구분선 -->
  <line x1="148" y1="148" x2="1052" y2="148" stroke="#1f3260" stroke-width="1"/>

  <!-- 메인 타이틀 -->
  <text x="148" y="238" font-family="Arial,sans-serif" font-size="82" font-weight="900" fill="#f5f0e8">Today's</text>
  <text x="148" y="338" font-family="Arial,sans-serif" font-size="86" font-weight="900" fill="#c9a84c">Labor</text>
  <text x="148" y="428" font-family="Arial,sans-serif" font-size="72" font-weight="900" fill="#f5f0e8">&#38; HR News</text>

  <!-- 서브 텍스트 -->
  <text x="148" y="480" font-family="Arial,sans-serif" font-size="20" fill="#7a8299">HR 담당자가 알아야 할 이슈</text>

  <!-- 구분선 -->
  <line x1="148" y1="508" x2="1052" y2="508" stroke="#1f3260" stroke-width="1"/>

  <!-- 하단 명의 -->
  <text x="148" y="542" font-family="Arial,sans-serif" font-size="18" font-weight="700" fill="#c9a84c">JP Labor News</text>
</svg>
