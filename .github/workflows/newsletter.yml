name: Weekly Newsletter (JP Labor Letter)

on:
  schedule:
    # 일요일 22:00 UTC = 월요일 07:00 KST
    - cron: '0 22 * * 0'
  workflow_dispatch:

jobs:
  generate-newsletter:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 레포지토리 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치 (Python 라이브러리 + Playwright)
        run: |
          pip install anthropic requests playwright
          playwright install chromium --with-deps

      - name: 주간 뉴스레터 생성 + PNG 변환 + Maily 발송
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID:      ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET:  ${{ secrets.NAVER_CLIENT_SECRET }}
          MAILY_API_KEY:        ${{ secrets.MAILY_API_KEY }}
          MAILY_PROJECT_ID:     ${{ secrets.MAILY_PROJECT_ID }}
          KAKAO_JS_KEY:         ${{ secrets.KAKAO_JS_KEY }}
        run: python generate_newsletter.py

      - name: GitHub에 자동 커밋 (HTML + PNG)
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Actions"
          git add newsletter/
          git diff --staged --quiet || git commit -m "Auto: $(date +'%Y%m%d') 인사 노무 브리핑 뉴스레터 생성 (HTML+PNG)"
          git push origin main
