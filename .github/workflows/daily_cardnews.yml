name: Daily Telegram Cardnews

on:
  schedule:
    - cron: '0 23 * * 0'
    - cron: '0 23 * * 1'
    - cron: '0 23 * * 2'
    - cron: '0 23 * * 3'
    - cron: '0 23 * * 4'
  workflow_dispatch:

jobs:
  generate-telegram-cardnews:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: 레포지토리 체크아웃
        uses: actions/checkout@v4

      - name: Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치 (Python 라이브러리 + Playwright)
        run: |
          pip install anthropic requests playwright
          playwright install chromium --with-deps

      - name: 텔레그램 카드뉴스 생성 및 발송
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          KAKAO_JS_KEY: ${{ secrets.KAKAO_JS_KEY }}
        run: python generate_cardnews.py

      - name: GitHub에 자동 커밋
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Actions"
          git add .
          git pull --rebase origin main
          git diff --staged --quiet || git commit -m "Auto: $(date +'%Y%m%d') 텔레그램 카드뉴스 자동 생성"
          git pull --rebase origin main
          git push origin main

      - name: jplabor 홈페이지에 카드뉴스 업로드
        env:
          JPLABOR_TOKEN: ${{ secrets.JPLABOR_TOKEN }}
        run: |
          DATE_STR=$(TZ=Asia/Seoul date +'%Y%m%d')
          git clone https://x-access-token:${JPLABOR_TOKEN}@github.com/jpm0rchase/jplabor.git _jplabor
          mkdir -p _jplabor/cardnews/${DATE_STR}
          cp ${DATE_STR}/labornews_${DATE_STR}.html _jplabor/cardnews/${DATE_STR}/index.html
          [ -f ${DATE_STR}/labornews_${DATE_STR}.png ] && cp ${DATE_STR}/labornews_${DATE_STR}.png _jplabor/cardnews/${DATE_STR}/
          cd _jplabor
          git config user.email "action@github.com"
          git config user.name "GitHub Actions"
          git add cardnews/
          git diff --staged --quiet || git commit -m "Auto: ${DATE_STR} 카드뉴스 업데이트"
          git push
